name: "random_voronoi"
namespace: "control_methods"
version: "build_main"
argument_groups:
- name: "Arguments"
  arguments:
  - type: "file"
    name: "--input"
    label: "Unlabelled"
    summary: "Preprocessed spatial transcriptomics data without segmentation labels\
      \ for method input."
    description: "This dataset contains preprocessed images and transcript point clouds\
      \ for spatial transcriptomics data.\nGround truth segmentation labels are intentionally\
      \ excluded to prevent methods from cheating.\n"
    info:
      format:
        type: "spatialdata_zarr"
        images:
        - type: "object"
          name: "morphology_mip"
          description: "The raw morphology image (maximum intensity projection)"
          required: true
        points:
        - type: "dataframe"
          name: "transcripts"
          description: "Point cloud data of transcripts"
          required: true
          columns:
          - type: "float"
            name: "x"
            required: true
            description: "x-coordinate of the point"
          - type: "float"
            name: "y"
            required: true
            description: "y-coordinate of the point"
          - type: "float"
            name: "z"
            required: false
            description: "z-coordinate of the point"
          - type: "categorical"
            name: "feature_name"
            required: true
            description: "Name of the feature"
          - type: "float"
            name: "qv"
            required: false
            description: "Quality value of the point"
          - type: "long"
            name: "transcript_id"
            required: true
            description: "Unique identifier of the transcript"
          - type: "boolean"
            name: "overlaps_nucleus"
            required: false
            description: "Whether the point overlaps with the nucleus (derived from\
              \ morphology)"
        tables:
        - type: "anndata"
          name: "table"
          description: "Metadata of spatial dataset"
          required: true
          uns:
          - type: "string"
            name: "dataset_id"
            required: true
            description: "A unique identifier for the dataset"
          - type: "string"
            name: "dataset_name"
            required: true
            description: "A human-readable name for the dataset"
          - type: "string"
            name: "dataset_url"
            required: true
            description: "Link to the original source of the dataset"
          - type: "string"
            name: "dataset_reference"
            required: true
            description: "Bibtex reference of the paper in which the dataset was published"
          - type: "string"
            name: "dataset_summary"
            required: true
            description: "Short description of the dataset"
          - type: "string"
            name: "dataset_description"
            required: true
            description: "Long description of the dataset"
          - type: "string"
            name: "dataset_organism"
            required: true
            description: "The organism of the sample in the dataset"
          - type: "string"
            name: "orig_dataset_id"
            required: true
            description: "The identifier of the original dataset from which this dataset\
              \ was derived (if applicable)"
          var:
          - type: "string"
            name: "feature_id"
            required: false
            description: "Unique identifier for the feature, usually a ENSEMBL gene\
              \ id."
          - type: "string"
            name: "feature_name"
            required: true
            description: "A human-readable name for the feature, usually a gene symbol."
        coordinate_systems:
        - type: "object"
          name: "global"
          description: "Coordinate system of the replicate"
          required: true
    example:
    - "resources_test/task_spatial_segmentation/mouse_brain_combined/spatial_unlabelled.zarr"
    must_exist: true
    create_parent: true
    required: true
    direction: "input"
    multiple: false
    multiple_sep: ";"
  - type: "file"
    name: "--input_solution"
    label: "Solution"
    summary: "Ground truth segmentation labels and cell assignments for method evaluation."
    description: "This dataset contains the ground truth cell and nucleus segmentation\
      \ labels,\ncell boundaries, and a reference table matching each cell to its\
      \ label region.\n"
    info:
      format:
        type: "spatialdata_zarr"
        points:
        - type: "dataframe"
          name: "transcripts"
          description: "Point cloud data of transcripts with ground truth cell assignments"
          required: true
          columns:
          - type: "float"
            name: "x"
            required: true
            description: "x-coordinate of the point"
          - type: "float"
            name: "y"
            required: true
            description: "y-coordinate of the point"
          - type: "float"
            name: "z"
            required: false
            description: "z-coordinate of the point"
          - type: "categorical"
            name: "feature_name"
            required: true
            description: "Name of the feature"
          - type: "integer"
            name: "cell_id"
            required: true
            description: "Ground truth cell assignment (0 = background)"
          - type: "long"
            name: "transcript_id"
            required: true
            description: "Unique identifier of the transcript"
        labels:
        - type: "object"
          name: "cell_labels"
          description: "Ground truth cell segmentation labels"
          required: true
        - type: "object"
          name: "nucleus_labels"
          description: "Ground truth nucleus segmentation labels"
          required: false
        shapes:
        - type: "dataframe"
          name: "cell_boundaries"
          description: "Ground truth cell boundary shapes"
          required: false
          columns:
          - type: "object"
            name: "geometry"
            required: true
            description: "Geometry of the cell boundary"
        - type: "dataframe"
          name: "nucleus_boundaries"
          description: "Ground truth nucleus boundary shapes"
          required: false
          columns:
          - type: "object"
            name: "geometry"
            required: true
            description: "Geometry of the nucleus boundary"
        tables:
        - type: "anndata"
          name: "table"
          description: "Reference cell metadata table"
          required: true
          obs:
          - type: "integer"
            name: "cell_id"
            description: "Unique cell identifier, matching instance IDs in the label\
              \ images"
            required: true
          - type: "string"
            name: "region"
            description: "Name of the label image this cell belongs to (e.g. 'cell_labels')"
            required: true
          - type: "double"
            name: "cell_area"
            description: "Area of the cell in pixels"
            required: false
          - type: "integer"
            name: "transcript_counts"
            description: "Total number of transcripts assigned to this cell"
            required: false
          uns:
          - type: "string"
            name: "dataset_id"
            description: "A unique identifier for the dataset"
            required: true
          - type: "string"
            name: "orig_dataset_id"
            required: true
            description: "The identifier of the original dataset from which this dataset\
              \ was derived (if applicable)"
          var:
          - type: "string"
            name: "feature_id"
            required: false
            description: "Unique identifier for the feature, usually a ENSEMBL gene\
              \ id."
          - type: "string"
            name: "feature_name"
            required: true
            description: "A human-readable name for the feature, usually a gene symbol."
    example:
    - "resources_test/task_spatial_segmentation/mouse_brain_combined/spatial_solution.zarr"
    must_exist: true
    create_parent: true
    required: true
    direction: "input"
    multiple: false
    multiple_sep: ";"
  - type: "file"
    name: "--output"
    label: "Predicted data"
    summary: "A predicted dataset as output by a method."
    info:
      format:
        type: "spatialdata_zarr"
        labels:
        - type: "object"
          name: "segmentation"
          description: "Segmentation of the data"
          required: true
        tables:
        - type: "anndata"
          name: "table"
          description: "AnnData table"
          required: true
          uns:
          - type: "string"
            name: "dataset_id"
            description: "A unique identifier for the dataset"
            required: true
          - type: "string"
            name: "method_id"
            description: "A unique identifier for the method"
            required: true
    example:
    - "resources_test/task_spatial_segmentation/mouse_brain_combined/prediction.zarr"
    must_exist: true
    create_parent: true
    required: true
    direction: "output"
    multiple: false
    multiple_sep: ";"
resources:
- type: "python_script"
  path: "script.py"
  is_executable: true
label: "Random Voronoi"
summary: "A negative control that assigns pixels to randomly placed seed points via\
  \ Voronoi tessellation."
description: "A negative control that places N seed points uniformly at random across\
  \ the\nimage (where N equals the number of cells in the ground truth) and assigns\n\
  each pixel to the nearest seed. This produces spatially coherent, non-overlapping\n\
  cells with realistic count but no biological basis, resulting in poor metric scores.\n"
test_resources:
- type: "python_script"
  path: "run_and_check_output.py"
  is_executable: true
- type: "python_script"
  path: "check_config.py"
  is_executable: true
- type: "file"
  path: "resources_test/task_spatial_segmentation/mouse_brain_combined"
  dest: "resources_test/task_spatial_segmentation/mouse_brain_combined"
info:
  type: "control_method"
  type_info:
    label: "Control Method"
    summary: "Quality control methods for verifying the pipeline."
    description: "This folder contains control components for the task. \nThese components\
      \ have the same interface as the regular methods\nbut also receive the solution\
      \ object as input. It serves as a\nstarting point to test the relative accuracy\
      \ of new methods in\nthe task, and also as a quality control for the metrics\
      \ defined\nin the task.\n"
status: "enabled"
scope:
  image: "public"
  target: "public"
repositories:
- type: "github"
  name: "openproblems"
  repo: "openproblems-bio/openproblems"
  tag: "build/main"
license: "MIT"
links:
  repository: "https://github.com/openproblems-bio/task_spatial_segmentation"
  docker_registry: "ghcr.io"
runners:
- type: "executable"
  id: "executable"
  docker_setup_strategy: "ifneedbepullelsecachedbuild"
- type: "nextflow"
  id: "nextflow"
  directives:
    label:
    - "midtime"
    - "lowmem"
    - "lowcpu"
    tag: "$id"
  auto:
    simplifyInput: true
    simplifyOutput: false
    transcript: false
    publish: false
  config:
    labels:
      lowmem: "memory = 20.Gb"
      midmem: "memory = 50.Gb"
      highmem: "memory = 100.Gb"
      lowcpu: "cpus = 5"
      midcpu: "cpus = 15"
      highcpu: "cpus = 30"
      lowtime: "time = 1.h"
      midtime: "time = 4.h"
      hightime: "time = 8.h"
      veryhightime: "time = 24.h"
  debug: false
  container: "docker"
engines:
- type: "docker"
  id: "docker"
  image: "openproblems/base_python:1"
  namespace_separator: "/"
  setup:
  - type: "python"
    user: false
    pypi:
    - "spatialdata>=0.7.3"
    - "anndata>=0.12.0"
    - "zarr>=3.0.0"
    upgrade: true
  entrypoint: []
  cmd: null
build_info:
  config: "src/control_methods/random_voronoi/config.vsh.yaml"
  runner: "executable"
  engine: "docker"
  output: "target/executable/control_methods/random_voronoi"
  executable: "target/executable/control_methods/random_voronoi/random_voronoi"
  viash_version: "0.9.7"
  git_commit: "a80cb3957cc3cf5cb2cf11d9e70e3896d6869832"
  git_remote: "https://github.com/openproblems-bio/task_spatial_segmentation"
package_config:

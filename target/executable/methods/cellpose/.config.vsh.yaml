name: "cellpose"
namespace: "methods"
version: "build_main"
argument_groups:
- name: "Arguments"
  arguments:
  - type: "file"
    name: "--input"
    label: "Unlabelled"
    summary: "Preprocessed spatial transcriptomics data without segmentation labels\
      \ for method input."
    description: "This dataset contains preprocessed images and transcript point clouds\
      \ for spatial transcriptomics data.\nGround truth segmentation labels are intentionally\
      \ excluded to prevent methods from cheating.\n"
    info:
      format:
        type: "spatialdata_zarr"
        images:
        - type: "object"
          name: "morphology_mip"
          description: "The raw morphology image (maximum intensity projection)"
          required: true
        points:
        - type: "dataframe"
          name: "transcripts"
          description: "Point cloud data of transcripts"
          required: true
          columns:
          - type: "float"
            name: "x"
            required: true
            description: "x-coordinate of the point"
          - type: "float"
            name: "y"
            required: true
            description: "y-coordinate of the point"
          - type: "float"
            name: "z"
            required: false
            description: "z-coordinate of the point"
          - type: "categorical"
            name: "feature_name"
            required: true
            description: "Name of the feature"
          - type: "float"
            name: "qv"
            required: false
            description: "Quality value of the point"
          - type: "long"
            name: "transcript_id"
            required: true
            description: "Unique identifier of the transcript"
          - type: "boolean"
            name: "overlaps_nucleus"
            required: false
            description: "Whether the point overlaps with the nucleus (derived from\
              \ morphology)"
        tables:
        - type: "anndata"
          name: "table"
          description: "Metadata of spatial dataset"
          required: true
          uns:
          - type: "string"
            name: "dataset_id"
            required: true
            description: "A unique identifier for the dataset"
          - type: "string"
            name: "dataset_name"
            required: true
            description: "A human-readable name for the dataset"
          - type: "string"
            name: "dataset_url"
            required: true
            description: "Link to the original source of the dataset"
          - type: "string"
            name: "dataset_reference"
            required: true
            description: "Bibtex reference of the paper in which the dataset was published"
          - type: "string"
            name: "dataset_summary"
            required: true
            description: "Short description of the dataset"
          - type: "string"
            name: "dataset_description"
            required: true
            description: "Long description of the dataset"
          - type: "string"
            name: "dataset_organism"
            required: true
            description: "The organism of the sample in the dataset"
          - type: "string"
            name: "orig_dataset_id"
            required: true
            description: "The identifier of the original dataset from which this dataset\
              \ was derived (if applicable)"
          var:
          - type: "string"
            name: "feature_id"
            required: false
            description: "Unique identifier for the feature, usually a ENSEMBL gene\
              \ id."
          - type: "string"
            name: "feature_name"
            required: true
            description: "A human-readable name for the feature, usually a gene symbol."
        coordinate_systems:
        - type: "object"
          name: "global"
          description: "Coordinate system of the replicate"
          required: true
    example:
    - "resources_test/task_spatial_segmentation/mouse_brain_combined/spatial_unlabelled.zarr"
    must_exist: true
    create_parent: true
    required: true
    direction: "input"
    multiple: false
    multiple_sep: ";"
  - type: "file"
    name: "--output"
    label: "Predicted data"
    summary: "A predicted dataset as output by a method."
    info:
      format:
        type: "spatialdata_zarr"
        labels:
        - type: "object"
          name: "segmentation"
          description: "Segmentation of the data"
          required: true
        tables:
        - type: "anndata"
          name: "table"
          description: "AnnData table"
          required: true
          uns:
          - type: "string"
            name: "dataset_id"
            description: "A unique identifier for the dataset"
            required: true
          - type: "string"
            name: "method_id"
            description: "A unique identifier for the method"
            required: true
    example:
    - "resources_test/task_spatial_segmentation/mouse_brain_combined/prediction.zarr"
    must_exist: true
    create_parent: true
    required: true
    direction: "output"
    multiple: false
    multiple_sep: ";"
  - type: "double"
    name: "--diameter"
    description: "Cell diameter in pixels. If not set, cellpose runs a size model\
      \ to estimate it (slower)."
    info:
      test_default: 30
    required: false
    direction: "input"
    multiple: false
    multiple_sep: ";"
  - type: "double"
    name: "--flow_threshold"
    description: "Flow error threshold. Set to 0 to skip flow quality check for faster\
      \ execution."
    info:
      test_default: 0
    required: false
    direction: "input"
    multiple: false
    multiple_sep: ";"
  - type: "integer"
    name: "--niter"
    description: "Number of iterations for dynamics. Lower values are faster but less\
      \ accurate."
    info:
      test_default: 10
    required: false
    direction: "input"
    multiple: false
    multiple_sep: ";"
  - type: "integer"
    name: "--min_size"
    description: "Minimum number of pixels per mask. Set to -1 to skip small mask\
      \ removal."
    info:
      test_default: -1
    required: false
    direction: "input"
    multiple: false
    multiple_sep: ";"
  - type: "boolean"
    name: "--resample"
    description: "Whether to run dynamics at original image size. Disabling is faster."
    info:
      test_default: false
    required: false
    direction: "input"
    multiple: false
    multiple_sep: ";"
resources:
- type: "python_script"
  path: "script.py"
  is_executable: true
label: "Cellpose"
summary: "Uses predicted flow fields to group pixels into cells via a center-convergence\
  \ mechanism."
description: "Rather than detecting cell boundaries directly, Cellpose trains a deep\
  \ neural network to predict, for every\npixel in an image, a vector pointing toward\
  \ the center of the cell that pixel belongs to, along with a\nprobability map indicating\
  \ whether each pixel is part of any cell at all. These per-pixel vectors\ncollectively\
  \ form a \"flow field.\" At inference time, each pixel is treated as a particle\
  \ that iteratively\nfollows the predicted flow directions, moving step by step toward\
  \ its eventual destination. Pixels belonging\nto the same cell all converge to the\
  \ same fixed point, and any group of pixels that lands at the same fixed\npoint\
  \ gets assigned a shared cell mask. This center-convergence framing lets the method\
  \ handle cells of\nhighly varied shapes and sizes without needing to explicitly\
  \ model cell outlines. The underlying network\nuses a U-Net-style architecture with\
  \ skip connections and was trained on a diverse dataset of over 70,000\nmanually\
  \ segmented objects spanning many cell types and imaging modalities, giving it broad\
  \ out-of-the-box\ngeneralization without requiring retraining or manual parameter\
  \ tuning for new datasets.\n"
test_resources:
- type: "python_script"
  path: "run_and_check_output.py"
  is_executable: true
- type: "python_script"
  path: "check_config.py"
  is_executable: true
- type: "file"
  path: "resources_test/task_spatial_segmentation/mouse_brain_combined"
  dest: "resources_test/task_spatial_segmentation/mouse_brain_combined"
info:
  type: "method"
  type_info:
    label: "Method"
    summary: "A method."
    description: "A method to predict the task effects.\n"
status: "enabled"
scope:
  image: "public"
  target: "public"
repositories:
- type: "github"
  name: "openproblems"
  repo: "openproblems-bio/openproblems"
  tag: "build/main"
license: "MIT"
references:
  doi:
  - "10.1038/s41592-020-01018-x"
links:
  repository: "https://github.com/mouseland/cellpose"
  docker_registry: "ghcr.io"
  documentation: "https://cellpose.readthedocs.io/en/latest/"
runners:
- type: "executable"
  id: "executable"
  docker_setup_strategy: "ifneedbepullelsecachedbuild"
- type: "nextflow"
  id: "nextflow"
  directives:
    label:
    - "midtime"
    - "midcpu"
    - "veryhighmem"
    - "gpu"
    tag: "$id"
  auto:
    simplifyInput: true
    simplifyOutput: false
    transcript: false
    publish: false
  config:
    labels:
      lowmem: "memory = 20.Gb"
      midmem: "memory = 50.Gb"
      highmem: "memory = 100.Gb"
      lowcpu: "cpus = 5"
      midcpu: "cpus = 15"
      highcpu: "cpus = 30"
      lowtime: "time = 1.h"
      midtime: "time = 4.h"
      hightime: "time = 8.h"
      veryhightime: "time = 24.h"
  debug: false
  container: "docker"
engines:
- type: "docker"
  id: "docker"
  image: "openproblems/base_pytorch_nvidia:1"
  namespace_separator: "/"
  setup:
  - type: "python"
    user: false
    pypi:
    - "spatialdata>=0.7.3"
    - "anndata>=0.12.0"
    - "zarr>=3.0.0"
    upgrade: true
  - type: "python"
    user: false
    pypi:
    - "cellpose"
    upgrade: true
  - type: "python"
    user: false
    script:
    - "from cellpose.models import CellposeModel; model = CellposeModel()"
    upgrade: true
  entrypoint: []
  cmd: null
- type: "native"
  id: "native"
build_info:
  config: "src/methods/cellpose/config.vsh.yaml"
  runner: "executable"
  engine: "docker|native"
  output: "target/executable/methods/cellpose"
  executable: "target/executable/methods/cellpose/cellpose"
  viash_version: "0.9.7"
  git_commit: "0e3d3e8cc5d5aa04a423e23c7bc025fb8791b6c3"
  git_remote: "https://github.com/openproblems-bio/task_spatial_segmentation"

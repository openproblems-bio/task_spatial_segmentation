name: "ari"
namespace: "metrics"
version: "build_main"
argument_groups:
- name: "Arguments"
  arguments:
  - type: "file"
    name: "--input_prediction"
    label: "Processed prediction"
    summary: "A processed predicted dataset, ready to be used as input for the evaluation."
    info:
      format:
        type: "spatialdata_zarr"
        labels:
        - type: "object"
          name: "segmentation"
          description: "Segmentation of the data"
          required: true
        tables:
        - type: "anndata"
          name: "table"
          description: "AnnData table"
          required: true
          layers:
          - type: "integer"
            name: "counts"
            description: "Raw counts"
            required: true
          - type: "double"
            name: "normalized"
            description: "Normalized expression values"
            required: true
          - type: "double"
            name: "normalized_log"
            description: "Log1p normalized expression values"
            required: true
          - type: "double"
            name: "normalized_log_scaled"
            description: "Log1p normalized expression values scaled to unit variance\
              \ and zero mean"
            required: true
          obs:
          - type: "string"
            name: "cell_id"
            description: "Cell ID"
            required: true
          - type: "string"
            name: "region"
            description: "Region"
            required: true
          var:
          - type: "string"
            name: "feature_id"
            description: "Unique identifier for the feature, usually a ENSEMBL gene\
              \ id."
            required: false
          - type: "string"
            name: "feature_name"
            description: "A human-readable name for the feature, usually a gene symbol."
            required: true
          - type: "boolean"
            name: "hvg"
            description: "Whether or not the feature is considered to be a 'highly\
              \ variable gene'"
            required: true
          uns:
          - type: "string"
            name: "dataset_id"
            description: "A unique identifier for the dataset"
            required: true
          - type: "string"
            name: "method_id"
            description: "A unique identifier for the method"
            required: true
    example:
    - "resources_test/task_spatial_segmentation/mouse_brain_combined/processed_prediction.zarr"
    must_exist: true
    create_parent: true
    required: true
    direction: "input"
    multiple: false
    multiple_sep: ";"
  - type: "file"
    name: "--input_solution"
    label: "Solution"
    summary: "Ground truth segmentation labels and cell assignments for method evaluation."
    description: "This dataset contains the ground truth cell and nucleus segmentation\
      \ labels,\ncell boundaries, and a reference table matching each cell to its\
      \ label region.\n"
    info:
      format:
        type: "spatialdata_zarr"
        points:
        - type: "dataframe"
          name: "transcripts"
          description: "Point cloud data of transcripts with ground truth cell assignments"
          required: true
          columns:
          - type: "float"
            name: "x"
            required: true
            description: "x-coordinate of the point"
          - type: "float"
            name: "y"
            required: true
            description: "y-coordinate of the point"
          - type: "float"
            name: "z"
            required: false
            description: "z-coordinate of the point"
          - type: "categorical"
            name: "feature_name"
            required: true
            description: "Name of the feature"
          - type: "integer"
            name: "cell_id"
            required: true
            description: "Ground truth cell assignment (0 = background)"
          - type: "long"
            name: "transcript_id"
            required: true
            description: "Unique identifier of the transcript"
        labels:
        - type: "object"
          name: "cell_labels"
          description: "Ground truth cell segmentation labels"
          required: true
        - type: "object"
          name: "nucleus_labels"
          description: "Ground truth nucleus segmentation labels"
          required: false
        shapes:
        - type: "dataframe"
          name: "cell_boundaries"
          description: "Ground truth cell boundary shapes"
          required: false
          columns:
          - type: "object"
            name: "geometry"
            required: true
            description: "Geometry of the cell boundary"
        - type: "dataframe"
          name: "nucleus_boundaries"
          description: "Ground truth nucleus boundary shapes"
          required: false
          columns:
          - type: "object"
            name: "geometry"
            required: true
            description: "Geometry of the nucleus boundary"
        tables:
        - type: "anndata"
          name: "table"
          description: "Reference cell metadata table"
          required: true
          obs:
          - type: "integer"
            name: "cell_id"
            description: "Unique cell identifier, matching instance IDs in the label\
              \ images"
            required: true
          - type: "string"
            name: "region"
            description: "Name of the label image this cell belongs to (e.g. 'cell_labels')"
            required: true
          - type: "double"
            name: "cell_area"
            description: "Area of the cell in pixels"
            required: false
          - type: "integer"
            name: "transcript_counts"
            description: "Total number of transcripts assigned to this cell"
            required: false
          uns:
          - type: "string"
            name: "dataset_id"
            description: "A unique identifier for the dataset"
            required: true
          - type: "string"
            name: "orig_dataset_id"
            required: true
            description: "The identifier of the original dataset from which this dataset\
              \ was derived (if applicable)"
          var:
          - type: "string"
            name: "feature_id"
            required: false
            description: "Unique identifier for the feature, usually a ENSEMBL gene\
              \ id."
          - type: "string"
            name: "feature_name"
            required: true
            description: "A human-readable name for the feature, usually a gene symbol."
    example:
    - "resources_test/task_spatial_segmentation/mouse_brain_combined/spatial_solution.zarr"
    must_exist: true
    create_parent: true
    required: true
    direction: "input"
    multiple: false
    multiple_sep: ";"
  - type: "file"
    name: "--output"
    label: "Score"
    summary: "File indicating the score of a metric."
    info:
      format:
        type: "h5ad"
        uns:
        - type: "string"
          name: "dataset_id"
          description: "A unique identifier for the dataset"
          required: true
        - type: "string"
          name: "normalization_id"
          description: "Which normalization was used"
          required: true
        - type: "string"
          name: "method_id"
          description: "A unique identifier for the method"
          required: true
        - type: "string"
          name: "metric_ids"
          description: "One or more unique metric identifiers"
          multiple: true
          required: true
        - type: "double"
          name: "metric_values"
          description: "The metric values obtained for the given prediction. Must\
            \ be of same length as 'metric_ids'."
          multiple: true
          required: true
    example:
    - "resources_test/task_spatial_segmentation/mouse_brain_combined/score.h5ad"
    must_exist: true
    create_parent: true
    required: true
    direction: "output"
    multiple: false
    multiple_sep: ";"
resources:
- type: "python_script"
  path: "script.py"
  is_executable: true
test_resources:
- type: "python_script"
  path: "run_and_check_output.py"
  is_executable: true
- type: "python_script"
  path: "check_config.py"
  is_executable: true
- type: "file"
  path: "resources_test/task_spatial_segmentation/mouse_brain_combined"
  dest: "resources_test/task_spatial_segmentation/mouse_brain_combined"
info:
  metrics:
  - name: "ari"
    label: "Adjusted Rand Index"
    summary: "ARI between ground truth and predicted transcript-to-cell assignments."
    description: "For each transcript, its cell ID is looked up in both the ground\
      \ truth\nlabel image (cell_labels) and the predicted segmentation label image.\n\
      The Adjusted Rand Index (ARI) is then computed between the two resulting\nassignment\
      \ vectors. ARI = 1 is perfect agreement; values near 0 are random.\nBackground\
      \ transcripts (cell_id = 0 in both) are excluded.\n"
    references:
      doi: "10.1007/BF01908075"
    min: -1
    max: 1
    maximize: true
  type: "metric"
  type_info:
    label: "Metric"
    summary: "A task template metric."
    description: "A metric for evaluating method predictions.\n"
status: "enabled"
scope:
  image: "public"
  target: "public"
repositories:
- type: "github"
  name: "openproblems"
  repo: "openproblems-bio/openproblems"
  tag: "build/main"
license: "MIT"
links:
  repository: "https://github.com/openproblems-bio/task_spatial_segmentation"
  docker_registry: "ghcr.io"
runners:
- type: "executable"
  id: "executable"
  docker_setup_strategy: "ifneedbepullelsecachedbuild"
- type: "nextflow"
  id: "nextflow"
  directives:
    label:
    - "midtime"
    - "midmem"
    - "midcpu"
    tag: "$id"
  auto:
    simplifyInput: true
    simplifyOutput: false
    transcript: false
    publish: false
  config:
    labels:
      lowmem: "memory = 20.Gb"
      midmem: "memory = 50.Gb"
      highmem: "memory = 100.Gb"
      lowcpu: "cpus = 5"
      midcpu: "cpus = 15"
      highcpu: "cpus = 30"
      lowtime: "time = 1.h"
      midtime: "time = 4.h"
      hightime: "time = 8.h"
      veryhightime: "time = 24.h"
  debug: false
  container: "docker"
engines:
- type: "docker"
  id: "docker"
  image: "openproblems/base_python:1"
  namespace_separator: "/"
  setup:
  - type: "python"
    user: false
    pypi:
    - "spatialdata>=0.7.3"
    - "anndata>=0.12.0"
    - "zarr>=3.0.0"
    upgrade: true
  entrypoint: []
  cmd: null
build_info:
  config: "src/metrics/ari/config.vsh.yaml"
  runner: "nextflow"
  engine: "docker"
  output: "target/nextflow/metrics/ari"
  executable: "target/nextflow/metrics/ari/main.nf"
  viash_version: "0.9.7"
  git_commit: "4e5d0169d81caa1d29bc860740f6bf1d7539e8fe"
  git_remote: "https://github.com/openproblems-bio/task_spatial_segmentation"
package_config:

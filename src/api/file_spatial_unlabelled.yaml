type: file
example: "resources_test/task_spatial_segmentation/mouse_brain_combined/spatial_unlabelled.zarr"
label: "Unlabelled Spatial Dataset"
summary: A spatial transcriptomics dataset, preprocessed for this benchmark.
description: |
  This dataset contains preprocessed images and transcript point clouds for spatial transcriptomics data.
  Ground truth segmentation labels are intentionally excluded to prevent methods from cheating.
info:
  format:
    type: spatialdata_zarr
    images:
      - type: object
        name: morphology_mip
        description: The raw morphology image (maximum intensity projection)
        required: true
    points:
      - type: dataframe
        name: transcripts
        description: Point cloud data of transcripts
        required: true
        columns:
          - type: float
            name: "x"
            required: true
            description: x-coordinate of the point
          - type: float
            name: "y"
            required: true
            description: y-coordinate of the point
          - type: float
            name: "z"
            required: false
            description: z-coordinate of the point
          - type: categorical
            name: feature_name
            required: true
            description: Name of the feature
          - type: float
            name: qv
            required: false
            description: Quality value of the point
          - type: long
            name: transcript_id
            required: true
            description: Unique identifier of the transcript
          - type: boolean
            name: overlaps_nucleus
            required: false
            description: Whether the point overlaps with the nucleus (derived from morphology)
    tables:
      - type: anndata
        name: "table"
        description: Metadata of spatial dataset
        required: true
        uns:
          - type: string
            name: dataset_id
            required: true
            description: A unique identifier for the dataset
          - type: string
            name: dataset_name
            required: true
            description: A human-readable name for the dataset
          - type: string
            name: dataset_url
            required: true
            description: Link to the original source of the dataset
          - type: string
            name: dataset_reference
            required: true
            description: Bibtex reference of the paper in which the dataset was published
          - type: string
            name: dataset_summary
            required: true
            description: Short description of the dataset
          - type: string
            name: dataset_description
            required: true
            description: Long description of the dataset
          - type: string
            name: dataset_organism
            required: true
            description: The organism of the sample in the dataset
          - type: string
            name: orig_dataset_id
            required: true
            description: The identifier of the original dataset from which this dataset was derived (if applicable)
        var:
          - type: string
            name: feature_id
            required: false
            description: Unique identifier for the feature, usually a ENSEMBL gene id.
          - type: string
            name: feature_name
            required: true
            description: A human-readable name for the feature, usually a gene symbol.
    coordinate_systems:
      - type: object
        name: global
        description: Coordinate system of the replicate
        required: true

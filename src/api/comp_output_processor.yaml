namespace: "data_processors"
info:
  type: data_processor
  type_info:
    label: Data processor
    summary: A data processor.
    description: |
      A component for processing a Common Dataset into a task-specific dataset.
argument_groups:
  - name: Inputs
    arguments:
      - name: "--input"
        __merge__: file_prediction.yaml
        required: true
        direction: input
      - name: "--input_spatial_dataset"
        __merge__: file_spatial_unlabelled.yaml
        required: true
        direction: input
  - name: Outputs
    arguments:
      - name: "--output"
        __merge__: file_processed_prediction.yaml
        direction: output
        required: true
test_resources:
  - type: python_script
    path: /common/component_tests/run_and_check_output.py

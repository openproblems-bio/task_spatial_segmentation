name: process_datasets
namespace: workflows

argument_groups:
  - name: Inputs
    arguments:
      - name: "--input_sp"
        __merge__: /src/api/file_common_ist.yaml
        required: true
        direction: input
      - name: "--input_sc"
        __merge__: /src/api/file_common_scrnaseq.yaml
        required: true
        direction: input
  - name: Outputs
    arguments:
      - name: "--output_spatial_dataset"
        __merge__: /src/api/file_spatial_dataset.yaml
        direction: output
        required: true
      - name: "--output_scrnaseq_reference"
        __merge__: /src/api/file_scrnaseq_reference.yaml
        direction: output
        required: true

resources:
  - type: nextflow_script
    path: main.nf
    entrypoint: run_wf
  - path: /common/nextflow_helpers/helper.nf

dependencies:
  - name: validation/check_dataset_with_schema
    repository: openproblems
  - name: data_processors/process_dataset

runners:
  - type: nextflow
